
{% extends "base.html"%}
{%block title%}Login Page{%endblock%}
{%block content%}

<link rel="stylesheet" href="{{url_for('static',filename='css/loginstyle.css')}}">

    <nav>
        <a href="{{url_for('home')}}"><img src="{{ url_for('static', filename='images/image-removebg-preview.png') }}" alt="" style="position: fixed; bottom: 0; left: 0; width: 50px;height: 50hv;"></a>
    </nav>
    
<div id="sign" style="border-radius: 50px; opacity: 80%;">
    <form action="#">
    <h1 style="font-family: brush script mt, cursive;;">login</h1>
    <div class="input-box">
        <input type="text" placeholder="Username" required>
    </div>
    <div class="input-box">
        <input type="password" placeholder="Password" required>
    </div>
    <div class="remember">
       <label><input type="checkbox">Remember me</label> 
       <a href="#">forget password?</a>
    </div>
    <div class="input-box">
        <button type="submit" class="btn">Login</button>
    </div>
<div class="signing-up">
<p>Don't have an account? <a href="{{url_for('signup')}}">Signup now</a></p>
</div>
    </form>
</div>
{%endblock%}
