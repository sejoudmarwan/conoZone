<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="cartstyle.css">

<body>

            </td>

            <td>

        </tr>
    </table>
    </div>

    <table class="price">
        <tr>
            <th colspan="2">
                <b>ToTal Price</b>

            <td>
                items
